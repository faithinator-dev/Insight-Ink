<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post - Insight-Ink</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">Insight-Ink</a>
            <ul class="nav-links">
                <li id="user-nav" style="display: none;" class="flex items-center gap-10">
                    <a href="write.html" class="btn btn-primary">Write</a>
                    <a href="inbox.html">Inbox</a>
                    <a href="profile.html">Profile</a>
                    <a href="#" onclick="auth.logout(); return false;">Logout</a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="container" style="max-width: 700px;">
        <div id="loading" style="display: none; text-align: center; padding: 40px;">
            <div class="loader"></div>
        </div>

        <div id="post-content">
            <article>
                <h1 id="post-title"></h1>
                <div id="post-meta" style="display: flex; gap: 15px; margin-bottom: 30px; color: var(--text-muted); font-size: 0.9rem;"></div>
                <div id="post-body" style="font-family: var(--font-serif); font-size: 1.1rem; line-height: 1.8;"></div>
            </article>

            <div style="display: flex; gap: 10px; margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border-color);">
                <button id="like-btn" class="btn btn-secondary">❤️ Like</button>
                <button onclick="document.getElementById('comment-form').scrollIntoView({behavior: 'smooth'})" class="btn btn-secondary">💬 Comment</button>
                <div id="edit-actions"></div>
            </div>
        </div>

        <!-- Comments Section -->
        <section style="margin-top: 50px;">
            <h2>Comments</h2>
            
            <form id="comment-form" onsubmit="handleComment(event)" style="margin-bottom: 30px;">
                <textarea placeholder="Add a comment..." id="comment-text" style="margin-bottom: 10px;" required></textarea>
                <button type="submit" class="btn btn-primary">Post Comment</button>
            </form>

            <div id="comments-container"></div>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="js/pages/post.js"></script>
</body>
</html>
